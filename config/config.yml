pipeline:
  lookback_days: 30
  # 可选：固定时间范围抓取（YYYY-MM-DD）；若填写则覆盖 lookback_days
  # date_from: "2024-01-01"
  # date_until: "2024-01-31"
  output_excel: "outputs/daily_papers.xlsx"
  db_url: "sqlite:///data/papers.db"
  
crossref:
  mailto: "senna_wang@emails.bjut.edu.cn"
  timeout_sec: 30
  per_page: 200
  polite_sleep_sec: 1.0
  
download:
  timeout_sec: 60
  polite_sleep_sec: 1.0
  
  wiley_mode: "tdm_client"
  wiley_limit_per_run: 30
  wiley_run_dir: "data/wiley_tdm_runs"

llm:
  provider: "openai"
  model: "qwen3.5-plus"
  api_key_env: "DASHSCOPE_API_KEY"
  base_url: "https://dashscope.aliyuncs.com/api/v2/apps/protocols/compatible-mode/v1"
  max_output_tokens: 900

summarize:
  limit_per_run: 3       # 每天免费额度就跑几篇
  chunk_max_chars: 8000
  max_chunks: 8